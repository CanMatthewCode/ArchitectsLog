name: Build Standalone Apps

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac
            icon: assets/ArchitectsLog_icon.icns
            ext: '-mac.zip'
            artifact: ArchitectsLog-mac
          - os: windows-latest
            name: windows
            icon: assets/ArchitectsLog_icon.ico
            ext: '.exe'
            artifact: ArchitectsLog-windows
          - os: ubuntu-latest
            name: linux
            icon: assets/ArchitectsLog_icon.png
            ext: '-Linux'
            artifact: ArchitectsLog-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name "ArchitectsLog" \
            --icon "${{ matrix.icon }}" \
            --add-data "assets:assets" \
            --add-data "src/ui:ui" \
            --add-data "src/demo_ArchitectsLog.db:." \
            src/architectsLog_main.py
          cd dist && zip -r ArchitectsLog-mac.zip ArchitectsLog.app

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "ArchitectsLog" \
            --icon "${{ matrix.icon }}" \
            --add-data "assets:assets" \
            --add-data "src/ui:ui" \
            --add-data "src/demo_ArchitectsLog.db:." \
            src/architectsLog_main.py

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/ArchitectsLog dist/ArchitectsLog-Linux

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "ArchitectsLog" `
            --icon "${{ matrix.icon }}" `
            --add-data "assets;assets" `
            --add-data "src/ui;ui" `
            --add-data "src/demo_ArchitectsLog.db;." `
            src/architectsLog_main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/ArchitectsLog${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ArchitectsLog-mac/ArchitectsLog-mac.zip
            ArchitectsLog-windows/ArchitectsLog.exe
            ArchitectsLog-linux/ArchitectsLog-Linux
          generate_release_notes: true
